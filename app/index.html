<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Italia 90 App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html { -webkit-text-size-adjust: 100%; }
      html,body,#root{height:100%}
      body{
        margin:0; position:relative;
        font-family:Garet, Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background-color:#070571;
        /* Patrón azul texturizado sutil (no liso) + degradado de marca */
        background-image:
          radial-gradient(circle at 1px 1px, rgba(255,255,255,.02) 1px, transparent 1.6px),
          radial-gradient(circle at 1px 1px, rgba(0,0,0,.015) 1px, transparent 1.6px),
          linear-gradient(180deg, #0a0876 0%, #0b2b8f 55%, #061d6e 100%);
        background-size: 28px 28px, 28px 28px, cover;
        background-position: 0 0, 14px 14px, center;
        background-attachment: fixed, fixed, fixed;
      }
      #root{ position:relative; z-index:1; }
      body::before{
        content:none;
      }
      body::after{
        content:'';
        position:fixed; inset:0; z-index:0;
        pointer-events:none;
        background: linear-gradient(to bottom, rgba(7,5,113,0.06) 0%, rgba(7,5,113,0.12) 20%, rgba(7,5,113,0.12) 100%);
      }
      
      
    </style>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
  </html>
